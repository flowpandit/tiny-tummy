<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160">
  <defs>
    <radialGradient id="sun-haze" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff7d6" stop-opacity=".95"/>
      <stop offset="34%" stop-color="#ffe8a6" stop-opacity=".72"/>
      <stop offset="58%" stop-color="#ffd07a" stop-opacity=".42"/>
      <stop offset="78%" stop-color="#ffc06f" stop-opacity=".18"/>
      <stop offset="100%" stop-color="#ffc06f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sun-core" cx="46%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#fffce9"/>
      <stop offset="48%" stop-color="#ffe9ac"/>
      <stop offset="100%" stop-color="#f8c46d"/>
    </radialGradient>
    <filter id="soft-blur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="mist-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.8"/>
    </filter>
  </defs>
  <circle cx="80" cy="80" r="62" fill="url(#sun-haze)" filter="url(#soft-blur)"/>
  <circle cx="80" cy="80" r="39" fill="url(#sun-core)" opacity=".9"/>
  <circle cx="74" cy="73" r="28" fill="#fff8db" opacity=".28" filter="url(#mist-blur)"/>
  <ellipse cx="86" cy="88" rx="46" ry="34" fill="#ffd998" opacity=".18" filter="url(#mist-blur)"/>
  <ellipse cx="70" cy="94" rx="38" ry="24" fill="#fff4d2" opacity=".22" filter="url(#mist-blur)"/>
</svg>
